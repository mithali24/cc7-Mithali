name: Run Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    # This is the key: It 'cd's into the folder for every step below
    defaults:
      run:
        working-directory: post-browser

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          # Tells GitHub where to find the lockfile for caching
          cache-dependency-path: post-browser/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build
